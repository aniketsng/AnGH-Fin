<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Ledger - ANGH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root{
      --primary-color:#5e35b1;
      --accent-color:#388e3c;
      --debit-color:#d32f2f;
      --bg-color:#f5f5f5;
      --card-bg:#ffffff;
      --text-color:#333;
      --shadow:rgba(0,0,0,0.1);
    }
    body { font-family:'Segoe UI',sans-serif; margin:0; background:var(--bg-color); color:var(--text-color); padding:16px; padding-bottom:80px; }
    header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; font-size:1.2em; font-weight:bold; margin-bottom:16px; padding:12px 16px; background:var(--primary-color); color:white; border-radius:8px; }
    .back-btn { background:var(--primary-color); color:white; border:none; padding:8px 14px; font-size:0.95em; border-radius:6px; cursor:pointer; box-shadow:0 2px 4px var(--shadow); }
    .back-btn:hover { background:#4a148c; }
    .balance { font-weight:bold; }
    .balance.green { color:var(--accent-color); }
    .balance.red { color:var(--debit-color); }
    .entry { background:var(--card-bg); padding:12px; margin:10px 0; border-radius:6px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px var(--shadow); }
    .credit { color:var(--accent-color); }
    .debit { color:var(--debit-color); }
    .buttons { display:flex; gap:8px; }
    button { padding:6px 10px; font-size:0.9em; border:none; border-radius:6px; cursor:pointer; }
    .edit-btn { background:#1976d2; color:white; }
    .delete-btn { background:#d32f2f; color:white; }
    .export-btn { background:var(--accent-color); color:white; padding:8px 14px; font-size:0.95em; border-radius:6px; margin:0 10px; cursor:pointer; }
    .export-btn:hover { background:#2e7d32; }
    .bottom-bar { position:fixed; bottom:0; left:0; width:100%; display:flex; justify-content:space-around; padding:12px; background:var(--card-bg); box-shadow:0 -2px 5px var(--shadow); }
    .bottom-bar button { width:45%; padding:14px 0; font-size:1em; border-radius:30px; }
    .credit-btn { background:var(--accent-color); color:white; }
    .debit-btn { background:var(--debit-color); color:white; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999; }
    .modal-content { background:var(--card-bg); padding:24px; border-radius:10px; width:90%; max-width:360px; box-shadow:0 8px 16px var(--shadow); animation:fadeIn 0.3s ease-in-out; }
    .modal-content h3 { margin-top:0; color:var(--text-color); text-align:center; }
    .modal-content input { width:100%; margin:10px 0; padding:12px; font-size:1em; border:1px solid #ccc; border-radius:6px; }
    .modal-content button { margin-top:10px; padding:12px; font-size:1em; border-radius:6px; width:100%; cursor:pointer; border:none; }
    .modal-content button:first-of-type { background:var(--accent-color); color:white; }
    .modal-content button:last-of-type { background:#e0e0e0; color:var(--text-color); }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <header>
    <span id="customerName">Customer Name</span>
    <button class="export-btn" id="exportPDF">📄 Export PDF</button>
    <span id="runningBalance" class="balance">₹0.00</span>
  </header>
  <div id="entries"></div>
  <div class="bottom-bar">
    <button class="credit-btn" onclick="openEntryModal('credit')">➕ Credit</button>
    <button class="debit-btn" onclick="openEntryModal('debit')">➖ Debit</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const data = JSON.parse(localStorage.getItem('currentCustomer'));
    const customers = JSON.parse(localStorage.getItem('customers')) || [];
    const entriesDiv = document.getElementById('entries');
    const customerName = document.getElementById('customerName');
    const runningBalanceEl = document.getElementById('runningBalance');

    if (!data) {
      alert('Customer not found');
      goBack();
    } else {
      customerName.innerText = data.name;
      renderEntries();
    }

    function renderEntries() {
      entriesDiv.innerHTML = '';
      const customer = customers[data.index];
      let balance = 0;
      customer.transactions.forEach((entry, i) => {
        balance += entry.type === 'credit' ? entry.amount : -entry.amount;
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div>
            <div class="${entry.type}">₹${entry.amount.toFixed(2)} – ${entry.type.toUpperCase()}</div>
            <small>${entry.note || ''} (${new Date(entry.date).toLocaleDateString()})</small>
          </div>
          <div class="buttons">
            <button class="edit-btn" onclick="editEntry(${i})">Edit</button>
            <button class="delete-btn" onclick="deleteEntry(${i})">Delete</button>
          </div>`;
        entriesDiv.appendChild(div);
      });
      runningBalanceEl.textContent = `₹${balance.toFixed(2)}`;
      runningBalanceEl.className = 'balance ' + (balance >= 0 ? 'green' : 'red');
    }

    function goBack() {
      // if there is a referrer (we came from index), go back in history
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        // otherwise fall back to opening the main page
        window.location.href = 'index.html';
      }
    }

    function deleteEntry(index) {
      if (!confirm('Delete this entry?')) return;
      const customer = customers[data.index];
      customer.transactions.splice(index,1);
      localStorage.setItem('customers', JSON.stringify(customers));
      renderEntries();
    }

    function editEntry(index) {
      const existing = customers[data.index].transactions[index];
      openEntryModal(existing.type, index, existing);
    }

    function openEntryModal(type, editIndex=null, existing=null) {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `
        <div class="modal-content">
          <h3>${editIndex!==null?'Edit':'Add'} ${type.charAt(0).toUpperCase()+type.slice(1)}</h3>
          <input id="amount" type="number" placeholder="Amount" value="${existing?existing.amount:''}" />
          <input id="note" type="text" placeholder="Note (optional)" value="${existing?existing.note:''}" />
          <button onclick="submitEntry('${type}', ${editIndex})">${editIndex!==null?'Update':'Add'} Entry</button>
          <button onclick="this.closest('.modal').remove()">Cancel</button>
        </div>`;
      document.body.appendChild(modal);
    }

    function submitEntry(type, editIndex) {
      const amount = parseFloat(document.getElementById('amount').value);
      const note = document.getElementById('note').value;
      if (!amount||isNaN(amount)) return alert('Invalid amount');
      const customer = customers[data.index];
      const newEntry = { amount, note, type, date: new Date().toISOString() };

      if (editIndex !== null) { customer.transactions[editIndex] = newEntry; }
      else {
        customer.transactions.push(newEntry);
        syncToSheet({
          name: customer.name,
          phone: customer.phone,
          type, amount, note, date: newEntry.date
        });
      }

      localStorage.setItem('customers', JSON.stringify(customers));
      renderEntries();
      document.querySelector('.modal').remove();
    }

    document.getElementById('exportPDF').addEventListener('click', () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const customer = customers[data.index];
      doc.setFontSize(16);
      doc.text(`Customer: ${customer.name}`, 20, 20);
      let y = 30;
      customer.transactions.forEach((entry, i) => {
        const date = new Date(entry.date).toLocaleDateString();
        doc.setFontSize(12);
        doc.text(`${i+1}. ₹${entry.amount.toFixed(2)} – ${entry.type.toUpperCase()} (${date}) ${entry.note||''}`, 20, y);
        y += 8;
      });
      doc.save(`${customer.name}_ledger.pdf`);
    });

    function syncToSheet(entry) {
      fetch('https://script.google.com/macros/s/AKfycbzmr-XlbSnCiPS9_kOjDjYXye1U_MMkF5CPYcLgbApYtTQletIktHvKei2uOKKE_6qu0A/exec', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(entry)
      })
      .then(res => console.log('Synced entry'))
      .catch(err => console.error('Sync failed', err));
    }

  // register service worker for PWA support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
    });
  }
  </script>
</body>
</html>
