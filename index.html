<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json">
  <title>ANGH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d89ef" />
  <style>
    :root {
      --primary-color: #6d28d9;
      --bg-color: #f8f9fa;
      --text-color: #1a202c;
      --card-bg: #ffffff;
      --receive-color: #059669;
      --give-color: #dc2626;
      --button: #6d28d9;
      --button-hover: #5b21b6;
      --shadow: rgba(0, 0, 0, 0.08);
      --border-color: #e5e7eb;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(109, 40, 217, 0.15);
    }
    /* dark mode overrides */
    body.dark {
      --primary-color: #7c3aed;
      --bg-color: #0f172a;
      --text-color: #f1f5f9;
      --card-bg: #1e293b;
      --receive-color: #10b981;
      --give-color: #f87171;
      --button: #7c3aed;
      --button-hover: #6d28d9;
      --shadow: rgba(0, 0, 0, 0.3);
      --border-color: #334155;
      --glass-bg: rgba(0, 0, 0, 0.1);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-color) 100%);
      color: var(--text-color);
    }
    header {
      background: var(--primary-color);
      color: white;
      padding: 18px 20px;
      text-align: center;
      font-size: 1.9em;
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 6px var(--shadow);
      border-radius: 0 0 12px 12px;
    }
    main { padding: 16px; max-width: 600px; margin: auto; }
    input, button {
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }
    input {
      background: var(--card-bg);
      color: var(--text-color);
    }
    button {
      background: var(--button);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    /* settings and top add button should match other buttons */
    #settingsButton, #addCustomerTop {
      background: var(--button);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
    }

    button:hover { background: var(--button-hover); }
    .customer-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      position: relative;
      transition: background-color 0.2s, transform 0.18s ease, opacity 0.18s ease;
      will-change: transform, opacity;
    }
    .customer-card .customer-name { flex: 1; }
    .customer-card .balance { margin-right: 8px; }
    .customer-card:hover { background-color: var(--bg-color); opacity: 0.95; }
    .customer-card.active-click {
      transform: scale(0.96);
      opacity: 0.72;
    }
    .customer-name { font-weight: bold; font-size: 1.1em; }
    .balance { font-weight: bold; font-size: 1.05em; }
    .credit { color: var(--receive-color); }
    .debit { color: var(--give-color); }
    /* three-dot menu styles */
    .card-menu { position: relative; /* no extra padding, button is absolutely positioned */ }
    .menu-button {
      background: transparent;
      border: none;
      font-size: 1.4em;
      cursor: pointer;
      padding: 4px;
      width: auto;
      line-height: 1;
      color: var(--text-color);
    }
    .menu-dropdown {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 12px var(--shadow);
      border-radius: 8px;
      display: none;
      flex-direction: column;
      min-width: 120px;
      z-index: 100;
      overflow: hidden;
    }
    .menu-dropdown.show { display: flex; }
    .menu-dropdown button {
      background: transparent;
      border: none;
      padding: 10px 14px;
      text-align: left;
      width: 100%;
      cursor: pointer;
      color: var(--text-color);
      font-size: 0.95em;
      transition: background 0.2s;
    }
    .menu-dropdown button:hover { background: var(--primary-color); color: white; }
    .filter-row {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .modal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 10px var(--shadow);
    }
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      background: var(--card-bg);
      box-shadow: 0 -2px 5px var(--shadow);
      z-index: 999;
    }
    .bottom-bar button {
      width: 90%;
      padding: 14px 0;
      font-size: 1em;
      border-radius: 30px;
    }
  </style>
</head>
<body>

<header>ANGH</header>
<main>
  <div id="totals" class="totals-row">
    <span id="totalCredit" class="credit">₹0.00</span>
    <span id="totalDebit" class="debit">₹0.00</span>
  </div>
  <div class="filter-row" style="display:flex; gap:10px;">
    <input id="filterName" type="text" placeholder="Search by name..." oninput="renderCustomers()" style="flex:3;" />
    <!-- add-customer button moved to top row -->
    <!-- containers give equal space to each control -->
    <div style="flex:2 1 0; display:flex;">
      <button id="addCustomerTop" class="button" style="width:100%;">Add Customer</button>
    </div>
    <!-- settings dropdown contains export/import -->
    <div class="card-menu" style="flex:2 1 0; position:relative; display:flex;">
      <button id="settingsButton" class="menu-button button" style="width:100%;">Settings</button>
      <div class="menu-dropdown" id="settingsDropdown">
        <button id="exportCSV">Export CSV</button>
        <button id="exportJSON">Export JSON</button>
        <button id="importData">Import</button>
        <button id="toggleDarkMode">Dark Mode</button>
      </div>
    </div>
    <!-- accept CSV or JSON/angh exports -->
    <input type="file" id="importFile" accept=".csv,application/json,.angh,text/csv" style="display:none" />
  </div>
  <div class="filter-row" style="justify-content:center; margin-top:10px;">
    <button onclick="clearFilter()">Clear</button>
  </div>
  <div id="customerList"></div>
</main>

<!-- bottom bar removed as requested -->

<script>
  const customers = JSON.parse(localStorage.getItem('customers')) || [];
  console.log('Loaded customers:', customers);

  // If no customers, add some sample data for testing
  if (customers.length === 0) {
    customers.push(
      { name: 'John Doe', phone: '1234567890', transactions: [
        { type: 'credit', amount: 1000, date: new Date().toISOString() },
        { type: 'debit', amount: 500, date: new Date().toISOString() }
      ]},
      { name: 'Jane Smith', phone: '', transactions: [
        { type: 'credit', amount: 2000, date: new Date().toISOString() }
      ]}
    );
    saveData();
    console.log('Added sample customers');
  }

  function saveData() {
    localStorage.setItem('customers', JSON.stringify(customers));
  }

  function exportDataCsv() {
    let csv = 'Customer Name,Phone,Credit Amount,Debit Amount,Balance\n';
    customers.forEach(customer => {
      let totalCredit = 0, totalDebit = 0;
      customer.transactions.forEach(t => {
        if (t.type === 'credit') totalCredit += t.amount;
        else totalDebit += t.amount;
      });
      const balance = totalCredit - totalDebit;
      const phone = customer.phone ? `"${customer.phone}"` : '';
      csv += `"${customer.name}",${phone},${totalCredit},${totalDebit},${balance}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportDataJson() {
    const jsonStr = JSON.stringify(customers, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `customers_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importDataFromFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const content = e.target.result;
        let arr = null;
        
        // Check if it's CSV format
        if (file.name.endsWith('.csv') || file.type === 'text/csv' || content.includes('Customer Name')) {
          arr = parseCSV(content);
          // For CSV import, merge with existing data to preserve transactions
          const mergedCustomers = importMergeCSV(arr);
          customers.length = 0;
          mergedCustomers.forEach(c => customers.push(c));
        } else {
          // Try JSON format - this completely replaces data
          arr = JSON.parse(content);
          if (!Array.isArray(arr)) {
            throw new Error('Invalid JSON format');
          }
          customers.length = 0;
          arr.forEach(c => customers.push(c));
        }
        
        if (customers.length > 0) {
          saveData();
          renderCustomers();
          alert('Import successful! ' + customers.length + ' customer(s) loaded.');
        } else {
          throw new Error('No valid customer data found');
        }
      } catch (err) {
        alert('Failed to import: ' + err.message);
      }
    };
    reader.readAsText(file);
  }
  
  function importMergeCSV(csvCustomers) {
    // For CSV import, merge with existing customers to preserve transactions
    const merged = [];
    const existingMap = new Map(customers.map(c => [c.name.toLowerCase(), c]));
    
    csvCustomers.forEach(csvCustomer => {
      const existing = existingMap.get(csvCustomer.name.toLowerCase());
      if (existing) {
        // Keep existing customer with transactions
        merged.push(existing);
      } else {
        // New customer from CSV
        merged.push(csvCustomer);
      }
    });
    
    // Keep any existing customers not in CSV
    customers.forEach(c => {
      if (!merged.some(m => m.name.toLowerCase() === c.name.toLowerCase())) {
        merged.push(c);
      }
    });
    
    return merged;
  }
  
  function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    const header = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    const arr = [];
    
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      
      // Parse CSV line handling quoted fields
      const values = [];
      let current = '';
      let inQuotes = false;
      for (let j = 0; j < lines[i].length; j++) {
        const char = lines[i][j];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          values.push(current.replace(/"/g, '').trim());
          current = '';
        } else {
          current += char;
        }
      }
      values.push(current.replace(/"/g, '').trim());
      
      if (values.length >= 1 && values[0]) {
        const customer = {
          name: values[0],
          phone: values[1] || '',
          transactions: [] // CSV export doesn't include transactions
        };
        arr.push(customer);
      }
    }
    return arr;
  }

  function showCustomerModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Add Customer</h3>
        <input id="name" type="text" placeholder="Customer Name" />
        <input id="phone" type="tel" placeholder="Phone Number (Optional)" />
        <button onclick="addCustomer(this)">Add</button>
        <button onclick="this.closest('.modal').remove()">Cancel</button>
      </div>`;
    document.body.appendChild(modal);
  }

  function addCustomer(button) {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!name) return alert('Customer name is required.');
    const newCustomer = { name, phone, transactions: [] };
    customers.push(newCustomer);
    saveData();
    syncToSheet({ name, phone, type: 'new_customer', date: new Date().toISOString() });
    button.closest('.modal').remove();
    renderCustomers();
  }

  function openCustomerPage(index) {
    const customer = customers[index];
    localStorage.setItem('currentCustomer', JSON.stringify({ ...customer, index }));
    window.location.href = 'customer.html';
  }

  function calculateBalance(transactions) {
    return transactions.reduce((total, t) => total + (t.type === 'credit' ? t.amount : -t.amount), 0);
  }

  function calculateTotals() {
    let credit = 0, debit = 0;
    customers.forEach(c => {
      // always include every customer regardless of any filter
      const balance = calculateBalance(c.transactions);
      if (balance >= 0) credit += balance;
      else debit += -balance; // treat negative balance as debit amount
    });
    return { credit, debit };
  }

  function clearFilter() {
    document.getElementById('filterName').value = '';
    renderCustomers();
  }

  function renderCustomers() {
    console.log('Rendering customers, total customers:', customers.length);
    const filterName = document.getElementById('filterName').value.toLowerCase();
    // update totals above search (grand totals, unaffected by filter)
    const totals = calculateTotals();
    document.getElementById('totalCredit').textContent = `Credit ₹${totals.credit.toFixed(2)}`;
    document.getElementById('totalDebit').textContent = `Debit ₹${totals.debit.toFixed(2)}`;

    const container = document.getElementById('customerList');
    container.innerHTML = '';
    // Create a sorted array with indices to maintain original position
    const sortedCustomers = customers.map((c, i) => ({ customer: c, originalIndex: i }))
      .sort((a, b) => a.customer.name.localeCompare(b.customer.name));
    
    console.log('Sorted customers:', sortedCustomers.length);
    sortedCustomers.forEach(({ customer: c, originalIndex: i }) => {
      if (filterName && !c.name.toLowerCase().includes(filterName)) return;
      const balance = calculateBalance(c.transactions);
      const balanceClass = balance >= 0 ? 'credit' : 'debit';
      const displayAmount = `₹${balance.toFixed(2)}`;

      const card = document.createElement('div');
      card.className = 'customer-card card-menu';
      card.addEventListener('click', function () {
        if (card.classList.contains('active-click')) return;
        card.classList.add('active-click');
        setTimeout(() => openCustomerPage(i), 140);
      });
      card.innerHTML = `
        <div class="customer-name">${c.name}</div>
        <div class="balance ${balanceClass}">${displayAmount}</div>
        <button class="menu-button" onclick="event.stopPropagation();toggleMenu(event, ${i})">⋮</button>
        <div class="menu-dropdown" id="menu-${i}">
          <button onclick="event.stopPropagation();renameCustomer(${i})">Rename</button>
          <button onclick="event.stopPropagation();deleteCustomer(${i})">Delete</button>
        </div>`;
      container.appendChild(card);
    });
    console.log('Rendered cards:', container.children.length);
  }

  function syncToSheet(entry) {
    fetch('https://script.google.com/macros/s/AKfycbzmr-XlbSnCiPS9_kOjDjYXye1U_MMkF5CPYcLgbApYtTQletIktHvKei2uOKKE_6qu0A/exec', {
      method: 'POST',
      body: JSON.stringify(entry),
      headers: {
        'Content-Type': 'application/json'
      }
    }).then(res => console.log('Synced:', entry)).catch(err => console.error('Sync failed', err));
  }

  function toggleMenu(event, index) {
    event.stopPropagation();
    const menu = document.getElementById(`menu-${index}`);
    if (menu) {
      menu.classList.toggle('show');
    }
  }

  // close menus when clicking anywhere else
  document.addEventListener('click', () => {
    document.querySelectorAll('.menu-dropdown.show').forEach(m => m.classList.remove('show'));
  });

  function renameCustomer(index) {
    const newName = prompt('Enter new name:', customers[index].name);
    if (newName && newName.trim()) {
      customers[index].name = newName.trim();
      saveData();
      renderCustomers();
    }
  }

  function deleteCustomer(index) {
    if (!confirm('Delete this customer and all transactions?')) return;
    customers.splice(index, 1);
    saveData();
    renderCustomers();
  }

  // export/import button listeners
  // top-row add customer
  document.getElementById('addCustomerTop').addEventListener('click', showCustomerModal);

  // settings button behaviour
  document.getElementById('settingsButton').addEventListener('click', event => {
    event.stopPropagation();
    document.getElementById('settingsDropdown').classList.toggle('show');
  });
  document.addEventListener('click', () => {
    document.getElementById('settingsDropdown')?.classList.remove('show');
  });

  document.getElementById('exportCSV').addEventListener('click', exportDataCsv);
  document.getElementById('exportJSON').addEventListener('click', exportDataJson);
  document.getElementById('importData').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importDataFromFile(file);
    e.target.value = '';
  });

  // dark mode support
  function applyDarkMode(enabled) {
    document.body.classList.toggle('dark', enabled);
    localStorage.setItem('darkMode', enabled);
    document.getElementById('toggleDarkMode').textContent = enabled ? 'Light Mode' : 'Dark Mode';
  }
  document.getElementById('toggleDarkMode').addEventListener('click', () => {
    applyDarkMode(!document.body.classList.contains('dark'));
  });
  // initialize from storage
  applyDarkMode(localStorage.getItem('darkMode') === 'true');

  // register service worker for PWA support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
    });
  }

  renderCustomers();
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
